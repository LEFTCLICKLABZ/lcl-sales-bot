services:
  - type: worker
    name: left-click-labz-sales-bot
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeployTrigger: commit
    buildCommand: corepack pnpm install --frozen-lockfile
    startCommand: corepack pnpm start
    disk:
      name: sales-bot-state
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DRY_RUN
        value: "false"
      - key: POST_IMAGES
        value: "true"
      - key: REQUIRE_IMAGES
        value: "true"
      - key: ENS_LOOKUP
        value: "true"
      - key: ENS_TIMEOUT_MS
        value: "1500"
      - key: RETRY_INTERVAL_MS
        value: "60000"
      - key: MAX_PENDING_SALES
        value: "250"
      - key: STATE_FILE
        value: /var/data/posted-sales.json
      - key: OPENSEA_COLLECTION_SLUGS
        value: smithsnfts,noidsofficial,abstractors-abstract,megahoneybadgers,buumeeofficial
      - key: COLLECTION_LABELS
        value: "smithsnfts:SMITHS,noidsofficial:NOIDS,abstractors-abstract:ABSTRACTORS,megahoneybadgers:MEGA HONEY BADGERS,buumeeofficial:BUUMEE"
      - key: OPENSEA_POLL_ENABLED
        value: "true"
      - key: OPENSEA_POLL_INTERVAL_MS
        value: "300000"
      - key: OPENSEA_POLL_LOOKBACK_MS
        value: "600000"
      - key: HASHTAGS
        value: ""
      - key: OPENSEA_API_KEY
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_SECRET
        sync: false
      - key: ETH_RPC_URL
        sync: false
